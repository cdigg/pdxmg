<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDX MegaGames</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="PDXMegaGames Logo" class="logo">
        <nav>
            <ul class="menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="what-is-a-megagame.html">What is a MegaGame?</a></li>
                <li><a href="games.html">Our Games</a></li>
                <li><a href="aar.html">After Action Reports</a></li>
                <li><a href="about-us.html">About Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home">
            <h1 class="centered">Welcome to PDX MegaGames</h1>
            
            This site is changed once in a while for major updates - the discord is where most activity and discussion is.<br />
            <div class="centered" style="margin-top:10px">
                <button  class="learn-more" onclick="location.href='https://discord.gg/ZPvpVEUrPd';">Join PDX MegaGames Discord</button>
            </div>
            <p></p>
            <div class="games-list" id="upcoming-games">
                <h3>Upcoming Games</h3>
            </div>
            <script>
            (async () => {
                const container = document.getElementById('upcoming-games');
                const escapeAttr = (s) => String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                try {
                    const res = await fetch('upcoming-games.json', { cache: 'no-cache' });
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    const games = await res.json();
                    for (const game of games) {
                        if (game.show === false) continue;
                        const card = document.createElement('div');
                        card.className = 'game';
                        let html = `
                    <div class="centered">
                        <img width="400" src="${escapeAttr(game.image)}" alt="${escapeAttr(game.imageAlt || game.title)}">
                    </div>
                    <h3>${escapeAttr(game.title)}</h3>
                    <p><strong>Location:</strong> ${escapeAttr(game.location)}</p>
                    <p><strong>Date:</strong> ${escapeAttr(game.date)}</p>
                    ${game.description || ''}`;
                        if (game.ticketUrl) {
                            const label = escapeAttr(game.ticketLabel || 'Get Tickets');
                            html += `
                    <div class="centered" style="margin-top:10px">
                        <button class="learn-more" onclick="location.href='${escapeAttr(game.ticketUrl)}'">${label}</button>
                    </div>`;
                        }
                        card.innerHTML = html;
                        container.appendChild(card);
                    }
                } catch (err) {
                    console.error('Failed to load upcoming games:', err);
                    const msg = document.createElement('p');
                    msg.textContent = 'Could not load upcoming games. Please check the Discord for the latest schedule.';
                    container.appendChild(msg);
                }
            })();
            </script>
        </section>
    </main>

    <footer>
        <p>&copy; 2024-2025 PDX MegaGames. All rights reserved.</p>
    </footer>
</body>
</html>
