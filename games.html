<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Games - PDX Megagames</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="PDXMegaGames Logo" class="logo">
        <nav>
            <ul class="menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="what-is-a-megagame.html">What is a MegaGame?</a></li>
                <li><a href="games.html">Our Games</a></li>
                <li><a href="aar.html">After Action Reports</a></li>
                <li><a href="about-us.html">About Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="our-games">
            <h2>Our Games</h2>
            <div class="games-list" id="our-games"></div>
            <script>
            (async () => {
                const container = document.getElementById('our-games');
                const escapeAttr = (s) => String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                const escapeText = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                try {
                    const res = await fetch('our-games.json', { cache: 'no-cache' });
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    const games = await res.json();
                    for (const game of games) {
                        if (game.show === false) continue;
                        const card = document.createElement('div');
                        card.className = 'game';
                        let html = `
                    <div class="centered">
                        <img width="400" src="${escapeAttr(game.image)}" alt="${escapeAttr(game.imageAlt || game.title)}">
                    </div>
                    <h3>${escapeAttr(game.title)}</h3>
                    ${game.description || ''}`;
                        if (game.nextGame) {
                            const ng = game.nextGame;
                            html += `
                    <div>
                        <strong>Next Game</strong>
                        <p>${escapeText(ng.date)}, ${escapeText(ng.location)}</p>
                    </div>`;
                            if (ng.ticketUrl) {
                                const label = escapeAttr(ng.ticketLabel || 'Get Tickets');
                                html += `
                    <div class="centered" style="margin-top:10px">
                        <button class="learn-more" onclick="location.href='${escapeAttr(ng.ticketUrl)}'">${label}</button>
                    </div>`;
                            }
                        }
                        if (Array.isArray(game.pastGames) && game.pastGames.length) {
                            html += `
                    <div>
                        <strong>Past Games</strong>
                        ${game.pastGames.map(p => `<p>${escapeText(p)}</p>`).join('')}
                    </div>`;
                        }
                        card.innerHTML = html;
                        container.appendChild(card);
                    }
                } catch (err) {
                    console.error('Failed to load games:', err);
                    const msg = document.createElement('p');
                    msg.textContent = 'Could not load games. Please check the Discord for the latest schedule.';
                    container.appendChild(msg);
                }
            })();
            </script>
        </section>
    </main>

    <footer>
        <p>&copy; 2024-2025 PDX MegaGames. All rights reserved.</p>
    </footer>
</body>
</html>
